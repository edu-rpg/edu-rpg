<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경험치 통장 - 내 기록</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <h2>⚔️ 경험치 통장</h2>
        </div>
        <div class="nav-right">
            <span id="user-name" class="nav-user"></span>
            <div class="notification-wrapper">
                <button class="notification-bell" id="notif-bell">🔔<span class="notif-badge" id="notif-count" style="display:none;"></span></button>
                <div class="notification-dropdown" id="notif-dropdown">
                    <div class="notif-header">알림</div>
                    <div id="notif-list"></div>
                </div>
            </div>
            <a href="student-input.html" class="btn btn-small btn-primary">경험치 입력</a>
            <button onclick="logout()" class="btn btn-small btn-secondary">로그아웃</button>
        </div>
    </nav>

    <main class="container">
        <!-- Level Display -->
        <div class="level-card">
            <div class="level-info">
                <span class="level-badge" id="level-badge">Lv.1</span>
                <span class="level-name" id="level-name"></span>
            </div>
            <div class="xp-bar-container">
                <div class="xp-bar" id="xp-bar" style="width: 0%"></div>
            </div>
            <div class="xp-text" id="xp-text">0%</div>
        </div>

        <!-- XP Table -->
        <div class="table-container">
            <h3>📖 경험치 기록</h3>
            <table class="xp-table" id="xp-table">
                <thead id="xp-table-head">
                    <tr>
                        <th>날짜</th>
                        <th>인사</th>
                        <!-- Dynamic value type columns inserted here -->
                        <th>과제</th>
                        <th>글쓰기</th>
                        <th>칭호</th>
                        <th>총 경험치</th>
                        <th>누적 경험치</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody id="xp-table-body">
                </tbody>
            </table>
            <p id="no-data" class="text-center text-muted" style="display:none;">아직 기록이 없습니다. 경험치를 입력해보세요!</p>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.100.1"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/student.js"></script>
</body>
</html>
