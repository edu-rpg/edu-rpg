<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경험치 통장 - 경험치 입력</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <h2>⚔️ 경험치 통장</h2>
        </div>
        <div class="nav-right">
            <span id="user-name" class="nav-user"></span>
            <div class="notification-wrapper">
                <button class="notification-bell" id="notif-bell">🔔<span class="notif-badge" id="notif-count" style="display:none;"></span></button>
                <div class="notification-dropdown" id="notif-dropdown">
                    <div class="notif-header">알림</div>
                    <div id="notif-list"></div>
                </div>
            </div>
            <a href="student.html" class="btn btn-small btn-secondary">내 기록</a>
            <button onclick="logout()" class="btn btn-small btn-secondary">로그아웃</button>
        </div>
    </nav>

    <main class="container">
        <div class="form-card">
            <h3>✏️ 오늘의 경험치 입력</h3>
            <form id="xp-form">
                <div class="form-group">
                    <label for="entry-date">날짜</label>
                    <input type="date" id="entry-date" required>
                </div>

                <div class="form-section">
                    <h4>인사 (3%)</h4>
                    <label class="checkbox-label">
                        <input type="checkbox" id="greetings">
                        <span>인사를 했습니다</span>
                    </label>
                </div>

                <div class="form-section">
                    <h4>가치 도장</h4>
                    <div id="value-stamps-container">
                        <!-- Dynamically loaded from value_types -->
                    </div>
                </div>

                <div class="form-section">
                    <h4>과제 (5%)</h4>
                    <div class="form-group">
                        <label for="assignments">과제 개수</label>
                        <input type="number" id="assignments" min="0" max="20" value="0">
                    </div>
                </div>

                <div class="form-section">
                    <h4>글쓰기</h4>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="writing" value="none" checked>
                            <span>없음</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="writing" value="5%">
                            <span>감사 일기 (5%)</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="writing" value="10%">
                            <span>주제 글쓰기 (10%)</span>
                        </label>
                    </div>
                </div>

                <div class="form-section">
                    <h4>칭호 (각 20%)</h4>
                    <div id="titles-section">
                        <div id="title-inputs">
                            <div class="title-row" style="margin-bottom: 6px;">
                                <input type="text" name="title-name" placeholder="칭호 이름 (없으면 비워두세요)" class="input-inline">
                            </div>
                        </div>
                        <button type="button" class="btn btn-small btn-secondary" id="add-title-btn" onclick="addTitleInput()" style="margin-top: 6px;">+ 칭호 추가</button>
                    </div>
                </div>

                <div class="form-summary" id="form-summary" style="display:none;">
                    <h4>예상 경험치</h4>
                    <p id="summary-text"></p>
                </div>

                <button type="submit" class="btn btn-primary btn-full">제출하기</button>
            </form>
        </div>
    </main>

    <!-- Success Modal -->
    <div class="modal-overlay" id="success-modal" style="display:none;">
        <div class="modal">
            <h3>🎉 경험치 제출 완료!</h3>
            <div id="modal-content"></div>
            <button class="btn btn-primary" onclick="closeModal()">확인</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.100.1"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/date-util.js"></script>
    <script src="js/student-input.js"></script>
</body>
</html>
