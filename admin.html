<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경험치 통장 - 관리자</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <h2>⚔️ 경험치 통장 <span class="badge badge-admin">관리자</span></h2>
        </div>
        <div class="nav-right">
            <div class="notification-wrapper">
                <button class="notification-bell" id="notif-bell">🔔<span class="notif-badge" id="notif-count" style="display:none;"></span></button>
                <div class="notification-dropdown" id="notif-dropdown">
                    <div class="notif-header">알림</div>
                    <div id="notif-list"></div>
                </div>
            </div>
            <a href="admin-students.html" class="btn btn-small btn-secondary">학생 관리</a>
            <a href="admin-approval.html" class="btn btn-small btn-primary">
                승인 관리 <span id="pending-count" class="count-badge" style="display:none;"></span>
            </a>
            <button onclick="logout()" class="btn btn-small btn-secondary">로그아웃</button>
        </div>
    </nav>

    <main class="container">
        <!-- Value Type Management -->
        <div class="card">
            <div class="card-header">
                <h3>📋 가치 종류 관리</h3>
                <button class="btn btn-small btn-primary" onclick="showAddValueType()">+ 추가</button>
            </div>
            <div id="add-value-type-form" class="inline-form" style="display:none;">
                <input type="text" id="new-vt-name" placeholder="가치 이름 (예: 국어)">
                <input type="number" id="new-vt-points" placeholder="포인트 %" value="5" min="1" max="100">
                <button class="btn btn-small btn-primary" onclick="addValueType()">추가</button>
                <button class="btn btn-small btn-secondary" onclick="hideAddValueType()">취소</button>
            </div>
            <table class="xp-table" id="value-types-table">
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>포인트</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="value-types-body"></tbody>
            </table>
        </div>

        <!-- Penalty Type Management -->
        <div class="card">
            <div class="card-header">
                <h3>⚠️ 감점 종류 관리</h3>
                <button class="btn btn-small btn-primary" onclick="showAddPenaltyType()">+ 추가</button>
            </div>
            <div id="add-penalty-type-form" class="inline-form" style="display:none;">
                <span>감점이름: </span>
                <input type="text" id="new-pt-name" placeholder="감점 이름 (예: 욕설)">
                <span>유형: </span>
                <div class="form-group" style="margin-bottom:0;">
                    <select id="new-pt-type" onchange="onNewPenaltyTypeChange()">
                        <option value="normal">일반</option>
                        <option value="rate">비율형</option>
                        <option value="reset">초기화</option>
                    </select>
                </div>
                <div id="new-pt-percent-group">
                    <input type="number" id="new-pt-percent" placeholder="%" value="5" min="1" max="100">
                    <span>%</span>
                </div>
                <div id="new-pt-rate-group" style="display:none;">
                    <span>/</span>
                    <input type="number" id="new-pt-rate-unit-count" placeholder="기준 수" value="10" min="1" style="width:80px;">
                    <input type="text" id="new-pt-rate-unit" placeholder="단위명 (예: 분)" style="width:80px;">
                </div>
                <button class="btn btn-small btn-primary" onclick="addPenaltyType()">추가</button>
                <button class="btn btn-small btn-secondary" onclick="hideAddPenaltyType()">취소</button>
            </div>
            <table class="xp-table" id="penalty-types-table">
                <thead>
                    <tr>
                        <th>이름</th>
                        <th>유형</th>
                        <th>감점 %</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="penalty-types-body"></tbody>
            </table>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/date-util.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
