<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경험치 통장 - 승인 관리</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <h2>⚔️ 경험치 통장 <span class="badge badge-admin">관리자</span></h2>
        </div>
        <div class="nav-right">
            <div class="notification-wrapper">
                <button class="notification-bell" id="notif-bell">🔔<span class="notif-badge" id="notif-count" style="display:none;"></span></button>
                <div class="notification-dropdown" id="notif-dropdown">
                    <div class="notif-header">알림</div>
                    <div id="notif-list"></div>
                </div>
            </div>
            <a href="admin-students.html" class="btn btn-small btn-secondary">학생 관리</a>
            <a href="admin.html" class="btn btn-small btn-secondary">관리 설정</a>
            <button onclick="logout()" class="btn btn-small btn-secondary">로그아웃</button>
        </div>
    </nav>

    <main class="container">
        <div class="card">
            <div class="card-header">
                <h3>📝 승인 대기 목록</h3>
                <button class="btn btn-small btn-primary" onclick="approveAll()">전체 승인</button>
            </div>
            <div id="pending-list"></div>
            <p id="no-pending" class="text-center text-muted" style="display:none;">승인 대기 중인 항목이 없습니다.</p>
        </div>
    </main>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal" style="display:none">
        <div class="modal modal-wide">
            <h3>✏️ 수정 후 승인</h3>
            <form id="edit-form">
                <input type="hidden" id="edit-entry-id">
                <div class="form-row">
                    <div class="form-group">
                        <label>날짜</label>
                        <input type="date" id="edit-date">
                    </div>
                    <div class="form-group">
                        <label>인사</label>
                        <label class="checkbox-label"><input type="checkbox" id="edit-greetings"><span>3%</span></label>
                    </div>
                    <div class="form-group">
                        <label>과제 개수</label>
                        <input type="number" id="edit-assignments" min="0" max="20" value="0" class="input-small">
                    </div>
                    <div class="form-group">
                        <label>글쓰기</label>
                        <select id="edit-writing">
                            <option value="none">없음</option>
                            <option value="5%">감사 일기 (5%)</option>
                            <option value="10%">주제 글쓰기 (10%)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>가치 도장</label>
                    <div id="edit-value-stamps"></div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-primary" onclick="saveEdit()">수정 후 승인</button>
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">취소</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/date-util.js"></script>
    <script src="js/admin-approval.js"></script>
</body>
</html>
